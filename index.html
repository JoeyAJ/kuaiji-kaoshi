<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>경제학원론 시험 대비</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{
  background:#0a0a0a;color:#f0f0f0;
  font-family:-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
  min-height:100vh;
}
.screen{display:none;min-height:100vh;padding:20px 16px 40px}
.screen.active{display:block}

/* ── 홈 화면 ── */
.home-title{font-size:22px;font-weight:700;color:#4ade80;text-align:center;margin-bottom:4px;margin-top:8px}
.home-sub{font-size:14px;color:#555;text-align:center;margin-bottom:24px}
.section-label{font-size:12px;color:#555;letter-spacing:0.06em;margin-bottom:10px;margin-top:4px}
.ch-grid{display:flex;flex-direction:column;gap:10px;margin-bottom:24px}
.ch-btn{
  background:#141414;border:1px solid #2a2a2a;border-radius:16px;
  padding:16px 18px;cursor:pointer;
  display:flex;justify-content:space-between;align-items:center;
  transition:border-color 0.15s;
}
.ch-btn:active{border-color:#4ade80}
.ch-num{font-size:12px;color:#555;margin-bottom:3px}
.ch-name{font-size:17px;font-weight:600;color:#f0f0f0}
.ch-count{font-size:13px;color:#444;flex-shrink:0;margin-left:10px}

/* ── 유형 선택 ── */
.type-grid{display:flex;gap:10px}
.type-btn{
  flex:1;padding:16px 8px;border-radius:16px;border:1px solid #2a2a2a;
  background:#141414;cursor:pointer;text-align:center;transition:all 0.15s;
}
.type-btn:active{transform:scale(0.97)}
.type-btn.t-all{border-color:#555}
.type-btn.t-concept{border-color:#1e4060;background:#0d1a2b}
.type-btn.t-calc{border-color:#3a1a55;background:#1a0d2b}
.type-icon{font-size:24px;margin-bottom:5px}
.type-label{font-size:15px;font-weight:600}
.t-all .type-label{color:#f0f0f0}
.t-concept .type-label{color:#60a5fa}
.t-calc .type-label{color:#c084fc}
.type-sub{font-size:12px;color:#555;margin-top:2px}

/* ── 카드 목록 화면 ── */
.list-header{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.back-btn{
  width:40px;height:40px;border-radius:50%;
  background:#1a1a1a;border:1px solid #333;
  color:#888;font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.list-title{font-size:17px;font-weight:700;color:#f0f0f0;line-height:1.3}
.list-sub-label{font-size:13px;color:#555;margin-top:2px}
.card-list{display:flex;flex-direction:column;gap:12px}

/* ── 카드 ── */
.card{background:#141414;border:1px solid #2a2a2a;border-radius:18px;overflow:hidden;cursor:pointer}
.card:active{border-color:#555}

/* 문제 블록 */
.q-block{padding:14px 16px 12px}
.q-label{font-size:11px;color:#444;letter-spacing:0.07em;margin-bottom:5px}
.q-text{font-size:17px;font-weight:500;color:#ccc;line-height:1.5}

/* 정답 블록 — 시각적으로 명확히 구분 */
.a-block{background:#0f1f0f;border-top:2px solid #22c55e;padding:13px 16px}
.a-label{font-size:11px;color:#22c55e;font-weight:700;letter-spacing:0.07em;margin-bottom:6px}
.a-text{font-size:17px;color:#e2e8f0;line-height:1.65}

/* 정답 하이라이트 클래스 */
.a-text .key{color:#4ade80;font-weight:700}        /* 핵심어 */
.a-text .num{color:#fbbf24;font-weight:700}        /* 숫자/금액 */
.a-text .formula{color:#c084fc;font-weight:700}   /* 공식/원칙 */
.a-text .entry{display:block;font-family:monospace;font-size:14px;line-height:1.9}
.a-text .debit{color:#67e8f9}                     /* 차변 */
.a-text .credit{color:#f9a8d4;padding-left:16px}  /* 대변 */

/* 접기/펼치기 */
.card.collapsed .a-block{display:none}
.card.collapsed .show-hint{display:flex}
.show-hint{display:none;padding:10px 16px;align-items:center;gap:6px;font-size:14px;color:#444}

.empty{text-align:center;padding:40px 0;font-size:16px;color:#444}

/* FAB 스크롤 버튼 */
.fab{
  position:fixed;bottom:20px;right:16px;
  width:46px;height:46px;border-radius:50%;
  background:#22c55e;color:#000;font-size:20px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  border:none;cursor:pointer;box-shadow:0 2px 14px rgba(34,197,94,0.35);
}
</style>
</head>
<body>

<!-- 홈 화면 -->
<div class="screen active" id="homeScreen">
  <div class="home-title">경제학원론 시험 대비</div>
  <div class="home-sub">챕터와 유형을 선택하세요</div>
  <div class="section-label">📂 챕터 선택</div>
  <div class="ch-grid" id="chGrid"></div>
  <div class="section-label">🔖 유형 선택</div>
  <div class="type-grid">
    <div class="type-btn t-all" onclick="setType('all',this)">
      <div class="type-icon">📋</div>
      <div class="type-label">전체</div>
      <div class="type-sub" id="cntAll"></div>
    </div>
    <div class="type-btn t-concept" onclick="setType('concept',this)">
      <div class="type-icon">📘</div>
      <div class="type-label">개념</div>
      <div class="type-sub" id="cntConcept"></div>
    </div>
    <div class="type-btn t-calc" onclick="setType('calc',this)">
      <div class="type-icon">🔢</div>
      <div class="type-label">계산</div>
      <div class="type-sub" id="cntCalc"></div>
    </div>
  </div>
</div>

<!-- 카드 목록 화면 -->
<div class="screen" id="listScreen">
  <div class="list-header">
    <button class="back-btn" onclick="goHome()">‹</button>
    <div>
      <div class="list-title" id="listTitle"></div>
      <div class="list-sub-label" id="listSub"></div>
    </div>
  </div>
  <div class="card-list" id="cardList"></div>
  <div class="empty" id="emptyMsg" style="display:none">해당 카드 없음</div>
</div>

<button class="fab" id="fabBtn" style="display:none" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<script>
// ── CARD DATA ──
const CARDS = [
  // 1강 - 경제학 기초 개념
  {ch:1, chName:'1강. 경제학 기초 개념', type:'concept', q:'합리적 선택(合理選擇)이란?', a:'<span class="key">한계편익</span>(얻는 이익)이 <span class="key">한계비용</span>(포기하는 비용)보다 <span class="key">크거나 같을 때</span> 이루어지는 의사결정.<br><br>當<span class="key">邊際利益</span>大於或等於<span class="key">邊際成本</span>時所做出的決策。'},
  {ch:1, chName:'1강. 경제학 기초 개념', type:'concept', q:'기회비용(機會成本)이란?', a:'어떤 선택을 함으로써 <span class="key">포기해야 하는 대안들 중에서 가장 가치가 큰 것</span>.<br><br>因為某個選擇而<span class="key">放棄的替代方案中,價值最高的那一個</span>。'},
  {ch:1, chName:'1강. 경제학 기초 개념', type:'concept', q:'매몰비용(沉沒成本)이란?', a:'<span class="key">이미 지출되어 다시 회수할 수 없는 비용</span>으로, 합리적 의사결정 시 <span class="key">고려해서는 안 되는 비용</span>.<br><br>已經支出且<span class="key">無法回收</span>,在理性決策時<span class="key">不應考慮</span>的成本。'},
  {ch:1, chName:'1강. 경제학 기초 개념', type:'concept', q:'미시경제이론(個體/微觀經濟理論)이란?', a:'<span class="key">가계, 기업 등 개별 경제주체</span>의 의사결정과 <span class="key">시장에서의 상호작용</span>을 연구하는 분야.<br><br>研究<span class="key">家戶、企業等個別經濟主體</span>的決策與<span class="key">市場互動</span>的領域。'},
  {ch:1, chName:'1강. 경제학 기초 개념', type:'concept', q:'거시경제이론(總體/宏觀經濟理論)이란?', a:'<span class="key">물가, 실업, 경제성장</span> 등 <span class="key">국가 경제 전체의 움직임</span>을 연구하는 분야.<br><br>研究<span class="key">物價、失業、經濟成長</span>等<span class="key">國家整體經濟運作</span>的領域。'},
  {ch:1, chName:'1강. 경제학 기초 개념', type:'concept', q:'국민경제내 경제주체들이란?', a:'경제활동을 수행하는 주체로 <span class="key">가계, 기업, 정부</span> 등을 일컫는 말.<br><br>執行經濟活動的主體,如<span class="key">家戶、企業、政府</span>等。'},
  {ch:1, chName:'1강. 경제학 기초 개념', type:'concept', q:'생산가능곡선(生產可能曲線, PPF)이란?', a:'한 사회가 가진 <span class="key">모든 생산요소와 기술을 효율적으로 사용</span>하여 <span class="key">최대로 생산할 수 있는 두 재화의 조합</span>을 나타낸 곡선.<br><br>一個社會<span class="key">有效率地使用所有生產要素與技術</span>,所能生產的<span class="key">兩種財貨最大組合</span>曲線。'},
  {ch:1, chName:'1강. 경제학 기초 개념', type:'concept', q:'시장경제(市場經濟)란?', a:'개별 경제주체들의 <span class="key">자유로운 의사결정</span>과 <span class="key">시장의 가격기구</span>에 의해 경제문제가 해결되는 체제.<br><br>由個別經濟主體<span class="key">自由決策</span>及<span class="key">市場價格機制</span>解決經濟問題的體制。'},
  {ch:1, chName:'1강. 경제학 기초 개념', type:'concept', q:'통제경제(統制經濟/計畫經濟)란?', a:'<span class="key">국가(정부)의 중앙계획</span>에 의해 자원배분 등 주요 경제문제가 결정되는 체제.<br><br>由<span class="key">國家中央計畫</span>決定資源分配等經濟問題的體制。'},
  {ch:1, chName:'1강. 경제학 기초 개념', type:'concept', q:'혼합경제(混合經濟)란?', a:'<span class="key">시장경제를 기본</span>으로 하면서 <span class="key">정부의 개입을 일부 허용</span>하는 경제체제.<br><br>以<span class="key">市場經濟為基礎</span>,<span class="key">部分允許政府介入</span>的經濟體制。'},

  // 2강 - 수요와 공급
  {ch:2, chName:'2강. 수요와 공급, 시장의 균형', type:'concept', q:'보이지 않는 손(看不見的手)이란?', a:'시장에서 <span class="key">가격기구</span>를 통해 <span class="key">개인의 이기적 행동이 사회 전체의 이익을 가져오는 원리</span> (애덤 스미스).<br><br>透過<span class="key">價格機制</span>,<span class="key">個人的自私行為帶來社會整體利益</span>的原理。'},
  {ch:2, chName:'2강. 수요와 공급, 시장의 균형', type:'concept', q:'시장과 교환(市場與交換)이란?', a:'<span class="key">재화와 서비스의 수요자와 공급자가 만나 거래가 이루어지는 곳</span>과 그 행위.<br><br><span class="key">供需雙方相遇進行交易的場所與行為</span>。'},
  {ch:2, chName:'2강. 수요와 공급, 시장의 균형', type:'concept', q:'가격/가격기구(價格/價格機制)란?', a:'시장에서 <span class="key">수요와 공급을 조절</span>하고 <span class="key">자원을 효율적으로 배분하는 신호</span> 역할을 하는 것.<br><br>在市場中<span class="key">調節供需</span>並作為<span class="key">有效分配資源訊號</span>的機制。'},
  {ch:2, chName:'2강. 수요와 공급, 시장의 균형', type:'concept', q:'수요의 법칙(需求法則)이란?', a:'가격이 상승하면 수요량이 감소하고, 가격이 하락하면 수요량이 증가하는 <span class="key">역(-)의 관계</span>.<br><br><span class="key">價格升需求降,價格降需求升</span>的反向關係。'},
  {ch:2, chName:'2강. 수요와 공급, 시장의 균형', type:'concept', q:'공급의 법칙(供給法則)이란?', a:'가격이 상승하면 공급량이 증가하고, 가격이 하락하면 공급량이 감소하는 <span class="key">정(+)의 관계</span>.<br><br><span class="key">價格升供給升,價格降供給降</span>的正向關係。'},
  {ch:2, chName:'2강. 수요와 공급, 시장의 균형', type:'concept', q:'수요의 가격탄력성(需求的價格彈性)이란?', a:'재화의 가격이 변동할 때, 그 재화의 <span class="key">수요량이 얼마나 민감하게 변하는지를 측정하는 척도</span>.<br><br>衡量價格變動時,<span class="key">需求量變動敏感度</span>的指標。'},
  {ch:2, chName:'2강. 수요와 공급, 시장의 균형', type:'concept', q:'소비자잉여(消費者剩餘)란?', a:'소비자가 <span class="key">지불할 용의가 있는 최대 금액</span>에서 <span class="key">실제로 지불한 금액을 뺀 차액</span>.<br><br>消費者<span class="key">願意支付的最高價格</span>減去<span class="key">實際支付的價格</span>。'},
  {ch:2, chName:'2강. 수요와 공급, 시장의 균형', type:'concept', q:'생산자잉여(生產者剩餘)란?', a:'생산자가 <span class="key">실제로 받은 금액</span>에서 <span class="key">최소한 받아야 하겠다고 생각한 금액을 뺀 차액</span>.<br><br>生產者<span class="key">實際收到的金額</span>減去其<span class="key">願意接受的最低金額</span>。'},

  // 4장 - 소비자의 선택
  {ch:4, chName:'4장. 소비자의 선택', type:'concept', q:'한계효용(邊際效用)이란?', a:'재화 <span class="key">1단위를 추가로 소비</span>할 때 얻게 되는 <span class="key">총효용의 증가분</span>.<br><br>增加消費<span class="key">一單位財貨</span>所帶來的<span class="key">總效用增加量</span>。'},
  {ch:4, chName:'4장. 소비자의 선택', type:'concept', q:'한계효용체감의 법칙(邊際效用遞減法則)이란?', a:'재화의 소비량이 증가함에 따라 추가적으로 얻는 <span class="key">한계효용이 점차 감소</span>하는 현상.<br><br>隨消費量增加,<span class="key">邊際效用逐漸遞減</span>的現象。'},
  {ch:4, chName:'4장. 소비자의 선택', type:'concept', q:'대체효과(替代效應)란?', a:'상대가격의 변화로 인해 <span class="key">상대적으로 비싸진 재화의 소비를 줄이고 저렴해진 재화의 소비를 늘리는 효과</span>.<br><br>因相對價格改變,<span class="key">少買變貴的、多買變便宜</span>的效應。'},
  {ch:4, chName:'4장. 소비자의 선택', type:'concept', q:'소득효과(所得效應)란?', a:'가격 하락으로 소비자의 <span class="key">실질소득이 증가한 것과 같은 효과</span>가 발생하여 수요량이 변하는 현상.<br><br>價格下降導致<span class="key">實質所得增加</span>,進而改變需求量的效應。'},

  // 5장 - 기업의 생산활동
  {ch:5, chName:'5장. 기업의 생산활동', type:'concept', q:'한계생산체감의 법칙(邊際產量遞減法則)이란?', a:'다른 생산요소는 고정시키고 <span class="key">한 요소를 계속 추가 투입</span>할 때, 어느 시점부터는 <span class="key">한계생산량이 감소</span>하는 현상.<br><br>固定其他要素,不斷增加單一要素投入,<span class="key">邊際產量終將減少</span>的現象。'},

  // 6-7장 - 시장구조
  {ch:6, chName:'6-7장. 시장구조', type:'concept', q:'완전경쟁시장(完全競爭市場)이란?', a:'<span class="key">수많은 수요자와 공급자</span>, <span class="key">동질적 상품</span>, <span class="key">진입과 탈퇴의 자유</span>, <span class="key">완전한 정보</span>를 특징으로 하는 시장.<br><br><span class="key">買賣方眾多、產品同質、進出自由、資訊完全</span>。'},
  {ch:6, chName:'6-7장. 시장구조', type:'concept', q:'독점시장(獨占市場)이란?', a:'<span class="key">단 하나의 공급자만 존재</span>하며 대체재가 없어 기업이 <span class="key">가격설정자</span>가 되는 시장.<br><br><span class="key">單一供給者、無替代品、為價格決定者</span>。'},
  {ch:6, chName:'6-7장. 시장구조', type:'concept', q:'독점경쟁시장(獨占性競爭市場)이란?', a:'다수의 공급자가 존재하지만, <span class="key">\'제품 차별화\'</span>를 통해 각 기업이 어느 정도 독점력을 가지는 시장.<br><br>供給者多,但透過<span class="key">「產品差異化」</span>擁有部分獨占力。'},

// ── APP LOGIC (do not modify) ──
const CHAPTERS=[...new Set(CARDS.map(c=>c.ch))];
let selType='all';

function init(){
  const grid=document.getElementById('chGrid');
  CHAPTERS.forEach(ch=>{
    const info=CARDS.find(c=>c.ch===ch);
    const total=CARDS.filter(c=>c.ch===ch).length;
    const btn=document.createElement('div');
    btn.className='ch-btn';
    btn.innerHTML=`<div><div class="ch-num">Ch ${ch}</div><div class="ch-name">${info.chName}</div></div><div class="ch-count">${total}장</div>`;
    btn.onclick=()=>openList(ch);
    grid.appendChild(btn);
  });
  document.getElementById('cntAll').textContent=CARDS.length+'장';
  document.getElementById('cntConcept').textContent=CARDS.filter(c=>c.type==='concept').length+'장';
  document.getElementById('cntCalc').textContent=CARDS.filter(c=>c.type==='calc').length+'장';
  document.querySelector('.t-all').style.opacity='1';
}

function setType(type,btn){
  selType=type;
  document.querySelectorAll('.type-btn').forEach(b=>{b.style.opacity='0.4';b.style.transform='scale(0.97)'});
  btn.style.opacity='1';btn.style.transform='scale(1)';
}

function openList(ch){
  const info=CARDS.find(c=>c.ch===ch);
  const typeLabel=selType==='all'?'전체':selType==='concept'?'📘 개념':'🔢 계산';
  document.getElementById('listTitle').textContent=info.chName;
  document.getElementById('listSub').textContent=typeLabel+' 카드';
  renderCards(ch);
  document.getElementById('homeScreen').classList.remove('active');
  document.getElementById('listScreen').classList.add('active');
  document.getElementById('fabBtn').style.display='flex';
  window.scrollTo(0,0);
}

function renderCards(ch){
  const filtered=CARDS.filter(c=>c.ch===ch&&(selType==='all'||c.type===selType));
  const list=document.getElementById('cardList');
  const empty=document.getElementById('emptyMsg');
  list.innerHTML='';
  if(!filtered.length){empty.style.display='block';return;}
  empty.style.display='none';
  filtered.forEach(c=>{
    const card=document.createElement('div');
    card.className='card collapsed';
    card.innerHTML=`
      <div class="q-block">
        <div class="q-label">${c.type==='concept'?'📘 개념':'🔢 계산'} &nbsp;Q 문제</div>
        <div class="q-text">${c.q}</div>
      </div>
      <div class="show-hint">👆 탭하면 정답 보기</div>
      <div class="a-block">
        <div class="a-label">✅ A 정답</div>
        <div class="a-text">${c.a}</div>
      </div>`;
    card.onclick=()=>card.classList.toggle('collapsed');
    list.appendChild(card);
  });
}

function goHome(){
  document.getElementById('listScreen').classList.remove('active');
  document.getElementById('homeScreen').classList.add('active');
  document.getElementById('fabBtn').style.display='none';
  window.scrollTo(0,0);
}

window.addEventListener('scroll',()=>{
  const fab=document.getElementById('fabBtn');
  if(fab.style.display==='flex') fab.style.opacity=window.scrollY>80?'1':'0';
});

init();
</script>
