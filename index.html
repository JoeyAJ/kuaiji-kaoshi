function buildFilters(){
  const cr=document.getElementById('chRow');
  cr.innerHTML='';
  const ab=mkPill('전체 챕터','all','ch');ab.classList.add('active-all');cr.appendChild(ab);
  CHAPTERS.forEach(ch=>{
    const c=CARDS.find(x=>x.ch===ch);
    const short=c.chName.replace(/^[IVX]+\.\s*/,'').slice(0,5);
    cr.appendChild(mkPill('Ch'+ch+' '+short,ch,'ch'));
  });
  const tr=document.getElementById('typeRow');
  tr.innerHTML='';
  const ab2=mkPill('전체 유형','all','type');ab2.classList.add('active-all');tr.appendChild(ab2);
  tr.appendChild(mkPill('📘 개념','concept','type'));
  tr.appendChild(mkPill('🔢 계산','calc','type'));
}

function mkPill(label,val,group){
  const b=document.createElement('button');
  b.className='pill';b.textContent=label;
  b.onclick=()=>setFilter(val,group,b);
  return b;
}

function setFilter(val,group,btn){
  if(group==='ch'){
    selCh=val;
    document.querySelectorAll('#chRow .pill').forEach(b=>{b.className='pill'});
    btn.className='pill '+(val==='all'?'active-all':'active-ch');
  } else {
    selType=val;
    document.querySelectorAll('#typeRow .pill').forEach(b=>{b.className='pill'});
    btn.className='pill '+(val==='all'?'active-all':val==='concept'?'active-concept':'active-calc');
  }
  applyFilter();
}

function applyFilter(){
  filtered=CARDS.filter(c=>(selCh==='all'||c.ch===selCh)&&(selType==='all'||c.type===selType));
  curIdx=0;
  if(curView==='watch')renderCard();else renderList();
  document.getElementById('fi').textContent='총 '+filtered.length+'장';
}

function nav(d){
  curIdx=Math.max(0,Math.min(filtered.length-1,curIdx+d));
  renderCard();
}

function renderCard(){
  if(!filtered.length){
    document.getElementById('wQ').textContent='해당 조건의 카드 없음';
    document.getElementById('wA').textContent='';
    return;
  }
  const c=filtered[curIdx];
  document.getElementById('wCh').textContent=c.chName;
  document.getElementById('wQ').innerHTML=c.q;
  document.getElementById('wA').innerHTML=c.a;
  document.getElementById('typeDot').className='type-dot '+(c.type==='concept'?'dot-concept':'dot-calc');
  document.getElementById('pb').disabled=curIdx===0;
  document.getElementById('nb').disabled=curIdx===filtered.length-1;
  document.getElementById('nc').textContent=(curIdx+1)+' / '+filtered.length;
  const dots=document.getElementById('ndots');
  dots.innerHTML='';
  const total=Math.min(filtered.length,5);
  const start=Math.max(0,Math.min(curIdx-2,filtered.length-5));
  for(let i=0;i<total;i++){
    const d=document.createElement('div');
    d.className='ndot'+(start+i===curIdx?' on':'');
    dots.appendChild(d);
  }
  const now=new Date();
  document.getElementById('wt').textContent=now.getHours()+':'+(now.getMinutes()<10?'0':'')+now.getMinutes();
}

function renderList(){
  const lp=document.getElementById('listPanel');
  lp.innerHTML='';
  if(!filtered.length){lp.innerHTML='<div style="color:var(--color-text-tertiary);font-size:13px;text-align:center;padding:1rem">해당 조건의 카드 없음</div>';return;}
  filtered.forEach((c,i)=>{
    const d=document.createElement('div');
    d.className='lc';
    const short=c.q.length>38?c.q.slice(0,38)+'…':c.q;
    d.innerHTML=`<div class="lc-top"><span class="lc-title">${short}</span><span class="lc-badge ${c.type==='concept'?'bc':'bq'}">${c.type==='concept'?'개념':'계산'}</span></div><div class="lc-ch">${c.chName}</div>`;
    d.onclick=()=>{curIdx=i;setView('watch');};
    lp.appendChild(d);
  });
}

function setView(v){
  curView=v;
  document.getElementById('watchPanel').style.display=v==='watch'?'inline-block':'none';
  document.getElementById('listPanel').style.display=v==='list'?'flex':'none';
  document.getElementById('vw').className='pill '+(v==='watch'?'active-all':'');
  document.getElementById('vl').className='pill '+(v==='list'?'active-all':'');
  if(v==='watch')renderCard();else renderList();
}

buildFilters();
setView('list');
applyFilter();
</script>
