<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>재무회계관리 기말고사</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{
  background:#0a0a0a;color:#f0f0f0;
  font-family:-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
  min-height:100vh;
}
.screen{display:none;min-height:100vh;padding:20px 16px 40px}
.screen.active{display:block}

/* ── 홈 화면 ── */
.home-title{font-size:22px;font-weight:700;color:#4ade80;text-align:center;margin-bottom:4px;margin-top:8px}
.home-sub{font-size:14px;color:#555;text-align:center;margin-bottom:24px}
.section-label{font-size:12px;color:#555;letter-spacing:0.06em;margin-bottom:10px;margin-top:4px}
.ch-grid{display:flex;flex-direction:column;gap:10px;margin-bottom:24px}
.ch-btn{
  background:#141414;border:1px solid #2a2a2a;border-radius:16px;
  padding:16px 18px;cursor:pointer;
  display:flex;justify-content:space-between;align-items:center;
  transition:border-color 0.15s;
}
.ch-btn:active{border-color:#4ade80}
.ch-num{font-size:12px;color:#555;margin-bottom:3px}
.ch-name{font-size:17px;font-weight:600;color:#f0f0f0}
.ch-count{font-size:13px;color:#444;flex-shrink:0;margin-left:10px}

/* ── 유형 선택 ── */
.type-grid{display:flex;gap:10px}
.type-btn{
  flex:1;padding:16px 8px;border-radius:16px;border:1px solid #2a2a2a;
  background:#141414;cursor:pointer;text-align:center;transition:all 0.15s;
}
.type-btn:active{transform:scale(0.97)}
.type-btn.t-all{border-color:#555}
.type-btn.t-concept{border-color:#1e4060;background:#0d1a2b}
.type-btn.t-calc{border-color:#3a1a55;background:#1a0d2b}
.type-icon{font-size:24px;margin-bottom:5px}
.type-label{font-size:15px;font-weight:600}
.t-all .type-label{color:#f0f0f0}
.t-concept .type-label{color:#60a5fa}
.t-calc .type-label{color:#c084fc}
.type-sub{font-size:12px;color:#555;margin-top:2px}

/* ── 카드 목록 화면 ── */
.list-header{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.back-btn{
  width:40px;height:40px;border-radius:50%;
  background:#1a1a1a;border:1px solid #333;
  color:#888;font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.list-title{font-size:17px;font-weight:700;color:#f0f0f0;line-height:1.3}
.list-sub-label{font-size:13px;color:#555;margin-top:2px}
.card-list{display:flex;flex-direction:column;gap:12px}

/* ── 카드 ── */
.card{background:#141414;border:1px solid #2a2a2a;border-radius:18px;overflow:hidden;cursor:pointer}
.card:active{border-color:#555}

/* 문제 블록 */
.q-block{padding:14px 16px 12px}
.q-label{font-size:11px;color:#444;letter-spacing:0.07em;margin-bottom:5px}
.q-text{font-size:17px;font-weight:500;color:#ccc;line-height:1.5}

/* 정답 블록 — 시각적으로 명확히 구분 */
.a-block{background:#0f1f0f;border-top:2px solid #22c55e;padding:13px 16px}
.a-label{font-size:11px;color:#22c55e;font-weight:700;letter-spacing:0.07em;margin-bottom:6px}
.a-text{font-size:17px;color:#e2e8f0;line-height:1.65}

/* 정답 하이라이트 클래스 */
.a-text .key{color:#4ade80;font-weight:700}        /* 핵심어 */
.a-text .num{color:#fbbf24;font-weight:700}        /* 숫자/금액 */
.a-text .formula{color:#c084fc;font-weight:700}   /* 공식/원칙 */
.a-text .entry{display:block;font-family:monospace;font-size:14px;line-height:1.9}
.a-text .debit{color:#67e8f9}                     /* 차변 */
.a-text .credit{color:#f9a8d4;padding-left:16px}  /* 대변 */

/* 접기/펼치기 */
.card.collapsed .a-block{display:none}
.card.collapsed .show-hint{display:flex}
.show-hint{display:none;padding:10px 16px;align-items:center;gap:6px;font-size:14px;color:#444}

.empty{text-align:center;padding:40px 0;font-size:16px;color:#444}

/* FAB 스크롤 버튼 */
.fab{
  position:fixed;bottom:20px;right:16px;
  width:46px;height:46px;border-radius:50%;
  background:#22c55e;color:#000;font-size:20px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  border:none;cursor:pointer;box-shadow:0 2px 14px rgba(34,197,94,0.35);
}
</style>
</head>
<body>

<!-- 홈 화면 -->
<div class="screen active" id="homeScreen">
  <div class="home-title">재무회계관리 기말고사</div>
  <div class="home-sub">챕터와 유형을 선택하세요</div>
  <div class="section-label">📂 챕터 선택</div>
  <div class="ch-grid" id="chGrid"></div>
  <div class="section-label">🔖 유형 선택</div>
  <div class="type-grid">
    <div class="type-btn t-all" onclick="setType('all',this)">
      <div class="type-icon">📋</div>
      <div class="type-label">전체</div>
      <div class="type-sub" id="cntAll"></div>
    </div>
    <div class="type-btn t-concept" onclick="setType('concept',this)">
      <div class="type-icon">📘</div>
      <div class="type-label">개념</div>
      <div class="type-sub" id="cntConcept"></div>
    </div>
    <div class="type-btn t-calc" onclick="setType('calc',this)">
      <div class="type-icon">🔢</div>
      <div class="type-label">계산</div>
      <div class="type-sub" id="cntCalc"></div>
    </div>
  </div>
</div>

<!-- 카드 목록 화면 -->
<div class="screen" id="listScreen">
  <div class="list-header">
    <button class="back-btn" onclick="goHome()">‹</button>
    <div>
      <div class="list-title" id="listTitle"></div>
      <div class="list-sub-label" id="listSub"></div>
    </div>
  </div>
  <div class="card-list" id="cardList"></div>
  <div class="empty" id="emptyMsg" style="display:none">해당 카드 없음</div>
</div>

<button class="fab" id="fabBtn" style="display:none" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<script>
// ── CARD DATA ──
const CARDS = [
  // ═══════════════════════════════════════════════════════════
  // Chapter 12 - 재무제표분석 (I)
  // ═══════════════════════════════════════════════════════════
  
  {ch:12, chName:'I. 재무제표분석 (12장)', type:'concept',

  {ch:12, chName:'I. 재무제표분석 (12장)', type:'concept', 
    q:'2. 추세분석 지표', 
    a:'<span class="key">매출액성장율</span>, <span class="key">총자산성장율</span>'},
  
  {ch:12, chName:'I. 재무제표분석 (12장)', type:'concept', 
    q:'3. 구성비분석(common-size analysis)', 
    a:'각 항목이 전체에서 차지하는 <span class="key">비중</span>을 분석<br><br>1) 재무상태표 항목은 <span class="key">총자산에 대한 비율</span>로 표시<br><br>2) 손익계산서 항목은 <span class="key">매출액에 대한 비율</span>로 표시'},
  
  {ch:12, chName:'I. 재무제표분석 (12장)', type:'concept', 
    q:'4. 구성비분석의 장점', 
    a:'1) 자산과 부채의 항목, 수익과 비용의 항목이 <span class="key">어떻게 구성되었는지 파악</span>할 수 있음<br><br>2) <span class="key">기업규모가 다른 여러 기업들간의 비교가 용이</span>함'},
  
  {ch:12, chName:'I. 재무제표분석 (12장)', type:'concept', 
    q:'5. 비율분석', 
    a:'재무제표 항목들간의 관계를 분석<br><br>1) <span class="key">주주</span>: 성장성 및 수익성 비율에 관심이 큼<br><br>2) <span class="key">단기채권자</span>: 유동성 비율에 관심이 큼<br><br>3) <span class="key">장기채권자</span>: 유동성 비율뿐 아니라 안전성 및 수익성 비율에도 관심 있음'},
  
  {ch:12, chName:'I. 재무제표분석 (12장)', type:'concept', 
    q:'6. 수익성', 
    a:'기업이 이익을 창출할 수 있는 능력<br><br>1) <span class="formula">매출액총이익율 = 매출총이익 / 매출액</span><br><br>2) <span class="formula">총자산이익율 = 이자비용차감전이익 / 평균총자산</span> 또는 <span class="formula">당기순이익 / 평균총자산</span><br><br>3) <span class="formula">자본이익율 = 당기순이익 / 평균자본</span><br><br>4) <span class="formula">주당이익 = (당기순이익 - 우선주배당금) / 가중평균유통주식수</span><br><br>5) <span class="formula">PER(Price-Earnings Ratio) = 주가 / 주당이익</span>'},
  
  {ch:12, chName:'I. 재무제표분석 (12장)', type:'concept', 
    q:'7. 활동성', 
    a:'기업이 보유한 자산을 얼마나 효율적으로 사용하는지를 측정<br><br>1) <span class="formula">매출채권회전율 = 매출액 / 평균매출채권</span><br><br>2) <span class="formula">매출채권평균회수기간 = 365 / 매출채권회전율</span><br><br>3) <span class="formula">재고자산회전율 = 매출원가 / 평균재고자산</span><br><br>4) <span class="formula">재고자산평균회전기간 = 365 / 재고자산회전율</span><br><br>5) <span class="formula">총자산회전율 = 매출액 / 평균총자산</span>'},
  
  {ch:12, chName:'I. 재무제표분석 (12장)', type:'concept',

  {ch:9, chName:'II. 금융자산(9장)', type:'concept', 
    q:'2. 채무상품', 
    a:'1) <span class="key">상각후원가측정금융자산(AC금융자산)</span>: 만기까지 보유할 목적으로 취득한 채권<br>&nbsp;&nbsp;&nbsp;- AC: amortized cost<br><br>2) <span class="key">기타포괄손익-공정가치금융자산(FVOCI금융자산)</span>: 이자를 수취하다가 만기이전에 매각하여 시세차익을 얻기 위해 취득한 채권<br>&nbsp;&nbsp;&nbsp;- FV: fair value, OCI: other comprehensive income<br><br>3) <span class="key">당기손익-공정가치측정금융자산(FVPL금융자산)</span>: 단기간 보유하다가 매도하여 시세차익을 목적으로 취득한 채권<br>&nbsp;&nbsp;&nbsp;- PL: profit or loss'},
  
  {ch:9, chName:'II. 금융자산(9장)', type:'concept',

  {ch:9, chName:'II. 금융자산(9장)', type:'concept',

  // ═══════════════════════════════════════════════════════════

// ── APP LOGIC (do not modify) ──
const CHAPTERS=[...new Set(CARDS.map(c=>c.ch))];
let selType='all';

function init(){
  const grid=document.getElementById('chGrid');
  CHAPTERS.forEach(ch=>{
    const info=CARDS.find(c=>c.ch===ch);
    const total=CARDS.filter(c=>c.ch===ch).length;
    const btn=document.createElement('div');
    btn.className='ch-btn';
    btn.innerHTML=`<div><div class="ch-num">Ch ${ch}</div><div class="ch-name">${info.chName}</div></div><div class="ch-count">${total}장</div>`;
    btn.onclick=()=>openList(ch);
    grid.appendChild(btn);
  });
  document.getElementById('cntAll').textContent=CARDS.length+'장';
  document.getElementById('cntConcept').textContent=CARDS.filter(c=>c.type==='concept').length+'장';
  document.getElementById('cntCalc').textContent=CARDS.filter(c=>c.type==='calc').length+'장';
  document.querySelector('.t-all').style.opacity='1';
}

function setType(type,btn){
  selType=type;
  document.querySelectorAll('.type-btn').forEach(b=>{b.style.opacity='0.4';b.style.transform='scale(0.97)'});
  btn.style.opacity='1';btn.style.transform='scale(1)';
}

function openList(ch){
  const info=CARDS.find(c=>c.ch===ch);
  const typeLabel=selType==='all'?'전체':selType==='concept'?'📘 개념':'🔢 계산';
  document.getElementById('listTitle').textContent=info.chName;
  document.getElementById('listSub').textContent=typeLabel+' 카드';
  renderCards(ch);
  document.getElementById('homeScreen').classList.remove('active');
  document.getElementById('listScreen').classList.add('active');
  document.getElementById('fabBtn').style.display='flex';
  window.scrollTo(0,0);
}

function renderCards(ch){
  const filtered=CARDS.filter(c=>c.ch===ch&&(selType==='all'||c.type===selType));
  const list=document.getElementById('cardList');
  const empty=document.getElementById('emptyMsg');
  list.innerHTML='';
  if(!filtered.length){empty.style.display='block';return;}
  empty.style.display='none';
  filtered.forEach(c=>{
    const card=document.createElement('div');
    card.className='card collapsed';
    card.innerHTML=`
      <div class="q-block">
        <div class="q-label">${c.type==='concept'?'📘 개념':'🔢 계산'} &nbsp;Q 문제</div>
        <div class="q-text">${c.q}</div>
      </div>
      <div class="show-hint">👆 탭하면 정답 보기</div>
      <div class="a-block">
        <div class="a-label">✅ A 정답</div>
        <div class="a-text">${c.a}</div>
      </div>`;
    card.onclick=()=>card.classList.toggle('collapsed');
    list.appendChild(card);
  });
}

function goHome(){
  document.getElementById('listScreen').classList.remove('active');
  document.getElementById('homeScreen').classList.add('active');
  document.getElementById('fabBtn').style.display='none';
  window.scrollTo(0,0);
}

window.addEventListener('scroll',()=>{
  const fab=document.getElementById('fabBtn');
  if(fab.style.display==='flex') fab.style.opacity=window.scrollY>80?'1':'0';
});

init();
</script>
