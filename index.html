<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>회계학 카드</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{
  background:#0a0a0a;color:#f0f0f0;
  font-family:-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
  min-height:100vh;font-size:16px;
}

/* ── 화면 전환 ── */
.screen{display:none;min-height:100vh;padding:20px 16px 40px}
.screen.active{display:block}

/* ── 홈 화면 ── */
.home-title{
  font-size:22px;font-weight:700;
  color:#4ade80;text-align:center;
  margin-bottom:6px;margin-top:8px;
}
.home-sub{font-size:15px;color:#555;text-align:center;margin-bottom:28px}
.section-label{font-size:13px;color:#555;letter-spacing:0.06em;margin-bottom:10px}

.ch-grid{display:flex;flex-direction:column;gap:10px;margin-bottom:28px}
.ch-btn{
  background:#141414;border:1px solid #2a2a2a;
  border-radius:16px;padding:16px 18px;
  cursor:pointer;transition:border-color 0.15s;
  display:flex;justify-content:space-between;align-items:center;
}
.ch-btn:active{border-color:#4ade80}
.ch-btn-left{text-align:left}
.ch-num{font-size:13px;color:#555;margin-bottom:3px}
.ch-name{font-size:17px;font-weight:600;color:#f0f0f0}
.ch-count{font-size:13px;color:#444;flex-shrink:0;margin-left:10px}

.type-grid{display:flex;gap:10px}
.type-btn{
  flex:1;padding:18px 10px;
  border-radius:16px;border:1px solid #2a2a2a;
  background:#141414;cursor:pointer;
  text-align:center;transition:all 0.15s;
}
.type-btn:active{transform:scale(0.97)}
.type-btn.t-all{border-color:#555}
.type-btn.t-concept{border-color:#1e4060;background:#0d1a2b}
.type-btn.t-calc{border-color:#3a1a55;background:#1a0d2b}
.type-icon{font-size:26px;margin-bottom:6px}
.type-label{font-size:16px;font-weight:600}
.t-all .type-label{color:#f0f0f0}
.t-concept .type-label{color:#60a5fa}
.t-calc .type-label{color:#c084fc}
.type-sub{font-size:13px;color:#555;margin-top:3px}

/* ── 카드 목록 화면 ── */
.list-header{
  display:flex;align-items:center;gap:12px;
  margin-bottom:20px;
}
.back-btn{
  width:40px;height:40px;border-radius:50%;
  background:#1a1a1a;border:1px solid #333;
  color:#888;font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.list-title{font-size:18px;font-weight:700;color:#f0f0f0}
.list-sub-label{font-size:14px;color:#555}

.card-list{display:flex;flex-direction:column;gap:12px}
.card{
  background:#141414;border:1px solid #2a2a2a;
  border-radius:18px;overflow:hidden;cursor:pointer;
}
.card:active{border-color:#555}
.q-block{padding:16px 16px 14px}
.q-label{font-size:12px;color:#444;letter-spacing:0.07em;margin-bottom:6px}
.q-text{font-size:18px;font-weight:500;color:#ccc;line-height:1.5}
.a-block{
  background:#0f1f0f;border-top:2px solid #22c55e;
  padding:14px 16px;
}
.a-label{font-size:12px;color:#22c55e;font-weight:700;letter-spacing:0.07em;margin-bottom:7px}
.a-text{font-size:18px;color:#e2e8f0;line-height:1.65}
.a-text .key{color:#4ade80;font-weight:700}
.a-text .num{color:#fbbf24;font-weight:700}
.a-text .formula{color:#c084fc;font-weight:700}
.a-text .entry{display:block;font-family:monospace;font-size:15px;line-height:1.9}
.a-text .debit{color:#67e8f9}
.a-text .credit{color:#f9a8d4;padding-left:16px}

/* 접기 */
.card.collapsed .a-block{display:none}
.card.collapsed .show-hint{display:flex}
.show-hint{
  display:none;padding:12px 16px;
  align-items:center;gap:6px;
  font-size:15px;color:#444;
}

/* 상단 이동 버튼 */
.fab{
  position:fixed;bottom:20px;right:16px;
  width:46px;height:46px;border-radius:50%;
  background:#22c55e;color:#000;
  font-size:20px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  border:none;cursor:pointer;
  box-shadow:0 2px 14px rgba(34,197,94,0.35);
}
.empty{text-align:center;padding:40px 0;font-size:16px;color:#444}
</style>
</head>
<body>

<!-- 홈 화면 -->
<div class="screen active" id="homeScreen">
  <div class="home-title">회계학 중간고사</div>
  <div class="home-sub">챕터와 유형을 선택하세요</div>

  <div class="section-label">챕터 선택</div>
  <div class="ch-grid" id="chGrid"></div>

  <div class="section-label">유형 선택</div>
  <div class="type-grid">
    <div class="type-btn t-all" onclick="setType('all',this)">
      <div class="type-icon">📋</div>
      <div class="type-label">전체</div>
      <div class="type-sub" id="cntAll"></div>
    </div>
    <div class="type-btn t-concept" onclick="setType('concept',this)">
      <div class="type-icon">📘</div>
      <div class="type-label">개념</div>
      <div class="type-sub" id="cntConcept"></div>
    </div>
    <div class="type-btn t-calc" onclick="setType('calc',this)">
      <div class="type-icon">🔢</div>
      <div class="type-label">계산</div>
      <div class="type-sub" id="cntCalc"></div>
    </div>
  </div>
</div>

<!-- 카드 목록 화면 -->
<div class="screen" id="listScreen">
  <div class="list-header">
    <button class="back-btn" onclick="goHome()">‹</button>
    <div>
      <div class="list-title" id="listTitle"></div>
      <div class="list-sub-label" id="listSub"></div>
    </div>
  </div>
  <div class="card-list" id="cardList"></div>
  <div class="empty" id="emptyMsg" style="display:none">해당 카드 없음</div>
</div>

<button class="fab" id="fabBtn" style="display:none" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<script>
const CARDS=[
  {ch:1,chName:'I. 레몬 시장',type:'concept',
   q:'정보 비대칭 하에서 재무제표와 감사의견의 역할은?',
   a:'<span class="key">재무제표</span> → 신호 전달 (Signaling)<br><span class="key">감사의견</span> → 선별 기능 (Screening)'},
  {ch:1,chName:'I. 레몬 시장',type:'concept',

  {ch:2,chName:'II. 회계학 입문',type:'concept',

   a:'외부 → <span class="key">재무회계</span> (주주, 채권자)<br>내부 → <span class="key">관리회계</span> (경영자, 종업원)'},
  {ch:2,chName:'II. 회계학 입문',type:'concept',

  {ch:2,chName:'II. 회계학 입문',type:'concept',

   a:'<span class="formula">자산 = 부채 + 자본</span><br>자본 = 납입자본 + 이익잉여금<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;+ 기타포괄손익누계액<br>기말이익잉여금 = 기초 + <span class="key">당기순이익</span> − <span class="num">배당금</span>'},

  {ch:2,chName:'II. 회계학 입문',type:'concept',
   q:'IFRS와 기존 회계기준의 근본적 차이',
   a:'기존: <span class="num">규칙중심</span> Rule-based<br>IFRS: <span class="key">원칙중심</span> Principle-based'},
  {ch:3,chName:'III. 회계순환',type:'concept',
   q:'수익과 비용의 인식 원칙은?',

  {ch:3,chName:'III. 회계순환',type:'calc',
   q:'2026.1.1 현금 5억으로 토지 구입, 분개는?',
   a:'<span class="entry debit">(차) 토지　　　 500,000,000</span><span class="entry credit">(대) 현금　　　 500,000,000</span>'},
  {ch:3,chName:'III. 회계순환',type:'calc',
   q:'2025.7.1 1억 차입, 연이율 4%, 12/31 이자비용 분개는?',
   a:'<span class="num">1억×4%×6/12 = 200만원</span><br><span class="entry debit">(차) 이자비용　　 2,000,000</span><span class="entry credit">(대) 미지급이자　 2,000,000</span>'},
  {ch:3,chName:'III. 회계순환',type:'calc',

   a:'<span class="num">1억×4%×6/12 = 200만원</span><br><span class="entry debit">(차) 미수이자수익 2,000,000</span><span class="entry credit">(대) 이자수익　　 2,000,000</span>'},
  {ch:3,chName:'III. 회계순환',type:'calc',
   q:'9.1 보험료 120만 선급, 12/31 수정분개 (4개월 경과)?',

  {ch:3,chName:'III. 회계순환',type:'calc',

   a:'9.1:<span class="entry debit">(차) 소모품　　 800,000</span><span class="entry credit">(대) 현금　　　 800,000</span>12.31 사용액 <span class="num">50만</span>:<span class="entry debit">(차) 소모품비　 500,000</span><span class="entry credit">(대) 소모품　　 500,000</span>'},
  {ch:4,chName:'IV. 현금·수취채권',type:'concept',

   a:'<span class="key">매출채권</span> = 외상매출금 + 받을어음<br><span class="key">매입채무</span> = 외상매입금 + 지급어음<br>순매출액 = 총매출액 − 에누리 − 환입 − 할인'},
  {ch:4,chName:'IV. 현금·수취채권',type:'concept',
   q:'선급비용·선수수익·미수수익·미지급비용의 정의',
   a:'<span class="key">선급비용</span>: 미래 비용 미리 지급<br><span class="key">선수수익</span>: 미래 수익 미리 수취<br><span class="key">미수수익</span>: 인식했으나 미수취<br><span class="key">미지급비용</span>: 인식했으나 미지급'},
  {ch:4,chName:'IV. 현금·수취채권',type:'concept',
   q:'선급금·선수금·예수금의 차이',
   a:'<span class="key">선급금</span>: 구매 전 일부 선지급<br><span class="key">선수금</span>: 판매 전 현금 미리 수취<br><span class="key">예수금</span>: 부가세·근로소득세 등<br>　　　　일시 보관 유동부채'},

  {ch:5,chName:'V. 재고자산',type:'concept',
   q:'재고자산 원가배분 4가지 방법',
   a:'① <span class="key">개별법</span>: 취득단가 직접 추적<br>② <span class="key">선입선출법 (FIFO)</span><br>③ <span class="key">후입선출법 (LIFO)</span><br>④ <span class="key">가중평균법</span>'},

  {ch:5,chName:'V. 재고자산',type:'calc',
   q:'재고자산 취득원가: 매입100만, 부대비20만, 에누리10만, 환출5만, 할인2만',

  {ch:6,chName:'VI. 유형·무형자산',type:'concept',

   a:'초과이익 창출능력의 화폐 표시<br><span class="formula">영업권 = 매수대가 − 순자산 공정가치</span><br>영업권은 <span class="key">상각하지 않음</span> → 매년 <span class="num">손상평가</span>'},
  {ch:6,chName:'VI. 유형·무형자산',type:'calc',

];

const CHAPTERS=[...new Set(CARDS.map(c=>c.ch))];
let selCh=null, selType='all';

function init(){
  // 챕터 버튼
  const grid=document.getElementById('chGrid');
  CHAPTERS.forEach(ch=>{
    const info=CARDS.find(c=>c.ch===ch);
    const total=CARDS.filter(c=>c.ch===ch).length;
    const btn=document.createElement('div');
    btn.className='ch-btn';
    btn.innerHTML=`<div class="ch-btn-left"><div class="ch-num">Ch ${ch}</div><div class="ch-name">${info.chName.replace(/^[IVX]+\.\s*/,'')}</div></div><div class="ch-count">${total}장</div>`;
    btn.onclick=()=>openList(ch);
    grid.appendChild(btn);
  });
  // 카운트
  document.getElementById('cntAll').textContent=CARDS.length+'장';
  document.getElementById('cntConcept').textContent=CARDS.filter(c=>c.type==='concept').length+'장';
  document.getElementById('cntCalc').textContent=CARDS.filter(c=>c.type==='calc').length+'장';
}

function setType(type,btn){
  selType=type;
  document.querySelectorAll('.type-btn').forEach(b=>{
    b.style.opacity='0.45';b.style.transform='scale(0.97)';
  });
  btn.style.opacity='1';btn.style.transform='scale(1)';
  if(selCh!==null) renderCards();
}

function openList(ch){
  selCh=ch;
  const info=CARDS.find(c=>c.ch===ch);
  const typeLabel=selType==='all'?'전체':selType==='concept'?'개념':'계산';
  document.getElementById('listTitle').textContent=info.chName;
  document.getElementById('listSub').textContent=typeLabel+' 카드';
  renderCards();
  document.getElementById('homeScreen').classList.remove('active');
  document.getElementById('listScreen').classList.add('active');
  document.getElementById('fabBtn').style.display='flex';
  window.scrollTo(0,0);
}

function renderCards(){
  const filtered=CARDS.filter(c=>c.ch===selCh&&(selType==='all'||c.type===selType));
  const list=document.getElementById('cardList');
  const empty=document.getElementById('emptyMsg');
  list.innerHTML='';
  if(!filtered.length){empty.style.display='block';return;}
  empty.style.display='none';
  filtered.forEach(c=>{
    const card=document.createElement('div');
    card.className='card collapsed';
    card.innerHTML=`
      <div class="q-block">
        <div class="q-label">${c.type==='concept'?'📘 개념':'🔢 계산'} &nbsp; Q 문제</div>
        <div class="q-text">${c.q}</div>
      </div>
      <div class="show-hint">👆 탭하면 정답 보기</div>
      <div class="a-block">
        <div class="a-label">✅ A 정답</div>
        <div class="a-text">${c.a}</div>
      </div>`;
    card.onclick=()=>card.classList.toggle('collapsed');
    list.appendChild(card);
  });
}

function goHome(){
  document.getElementById('listScreen').classList.remove('active');
  document.getElementById('homeScreen').classList.add('active');
  document.getElementById('fabBtn').style.display='none';
  window.scrollTo(0,0);
}

// 스크롤 시 FAB 표시
window.addEventListener('scroll',()=>{
  const fab=document.getElementById('fabBtn');
  if(fab.style.display==='flex'){
    fab.style.opacity=window.scrollY>100?'1':'0';
  }
});

init();
</script>
</body>
</html>
